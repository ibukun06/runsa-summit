  <!-- ── PRELOAD CRITICAL ASSETS ──────────────────────────────────────────── -->
  <link rel="preconnect" href="https://www.gstatic.com" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <!-- ── APP MOUNTING STYLES ──────────────────────────────────────────────── -->
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: #060d1a;
      color: #f5f0e8;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }
    /* Loading screen shown while React hydrates */
    #app-loading {
      position: fixed; inset: 0;
      background: #060d1a;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 20px; z-index: 9999;
      transition: opacity 0.4s;
    }
    #app-loading.hidden { opacity: 0; pointer-events: none; }
    .loading-logo {
      width: 68px; height: 68px; border-radius: 50%;
      border: 2px solid rgba(232,184,75,0.7);
      object-fit: cover;
      box-shadow: 0 0 24px rgba(201,146,10,0.3);
    }
    .loading-spinner {
      width: 36px; height: 36px;
      border: 2px solid rgba(26,58,107,0.3);
      border-top: 2px solid #e8b84b;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text {
      font-family: 'Arial', sans-serif;
      font-size: 11px; letter-spacing: 0.18em;
      text-transform: uppercase; color: rgba(138,155,181,0.7);
    }
  </style>
</head>
<body>

  <!-- Loading screen — hidden once React app mounts -->
  <div id="app-loading">
    <img class="loading-logo" src="/legislative-council-logo.jpg" alt="RUNSA" onerror="this.style.display='none'" />
    <div class="loading-spinner"></div>
    <div class="loading-text">RUNSA · Legislative Summit 2026</div>
  </div>

  <!-- React mounts here -->
  <div id="root"></div>

  <script>
    // Hide loading screen once React app is interactive
    window.__hideLoading = function() {
      var el = document.getElementById('app-loading');
      if (el) {
        el.classList.add('hidden');
        setTimeout(function() { el.remove(); }, 500);
      }
    };
    // Fallback: hide after 4 seconds regardless
    setTimeout(window.__hideLoading, 4000);
  </script>

  <!-- Vite/React build output injected here by bundler -->
  <!-- In your vite.config.js, this file is the template -->

</body>
</html>
